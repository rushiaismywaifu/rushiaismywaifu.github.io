<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="找不到頁面 — Rushia My Beloved Digital Garden" />
  <meta name="robots" content="noindex" />
  <meta name="theme-color" content="#090a1a" />
  <title>404 · 頁面迷路了 | Rushia My Beloved</title>
  <link rel="icon" href="/favicon.ico" type="image/x-icon" />
  <style>
    :root {
      --text: #f8fbff;
      --muted: rgba(248, 251, 255, 0.7);
      --cyan: #6ee7ff;
      --pink: #ff6ec7;
      color-scheme: dark;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 15% 15%, rgba(110, 231, 255, 0.22), transparent 32%),
        radial-gradient(circle at 85% 85%, rgba(255, 110, 199, 0.2), transparent 32%),
        linear-gradient(135deg, #050611 0%, #0b0d24 50%, #120719 100%);
      background-attachment: fixed;
      text-align: center;
    }
    .panel {
      max-width: 560px;
      width: 100%;
      padding: 48px 32px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 24px;
      background: rgba(13, 16, 38, 0.75);
      backdrop-filter: blur(16px);
      box-shadow: 0 20px 45px rgba(0, 0, 0, 0.5);
    }
    .code {
      font-size: clamp(4rem, 15vw, 7rem);
      font-weight: 900;
      line-height: 1;
      margin: 0;
      background: linear-gradient(135deg, #fff 0%, var(--cyan) 50%, var(--pink) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      color: transparent;
    }
    h1 { font-size: 1.4rem; margin: 16px 0 8px; }
    p { color: var(--muted); margin: 0 0 28px; line-height: 1.6; }
    .actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    .btn {
      display: inline-block;
      padding: 12px 24px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 700;
      text-decoration: none;
      color: #000;
      background: linear-gradient(135deg, var(--cyan), #7796ff);
      box-shadow: 0 6px 20px rgba(110, 231, 255, 0.3);
      transition: transform .2s, box-shadow .2s;
    }
    .btn.ghost {
      color: #fff;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow: none;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(110, 231, 255, 0.45); }
    .btn.ghost:hover { background: rgba(255, 255, 255, 0.15); box-shadow: none; }
  </style>
</head>
<body>
  <main class="panel">
    <p class="code">404</p>
    <h1>🦋 這個頁面迷路到別的次元了</h1>
    <p>您要找的頁面不存在或已搬家。<br />回到數位花園首頁,或直接前往熱門模組吧。</p>
    <div class="actions">
      <a class="btn" href="/">🏠 返回首頁</a>
      <a class="btn ghost" href="/discord-quest/">🎮 Quest 探索器</a>
      <a class="btn ghost" href="/music-player/">🎵 音樂播放器</a>
    </div>
  </main>
</body>
</html>
