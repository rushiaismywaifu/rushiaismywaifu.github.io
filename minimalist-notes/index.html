<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>📝 Minimalist Notes</title>
    
    <!-- Meta -->
    <meta name="author" content="ChatGPT × Claude AI 🤖">
    <meta name="description" content="極簡暗黑筆記本 — 自動保存 • 跨分頁同步 • 離線可用">
    <meta name="keywords" content="notes, 筆記, 極簡, minimalist, dark theme, offline, PWA">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#111111">
    <meta name="color-scheme" content="dark">
    
    <!-- Content Security Policy -->
    <meta http-equiv="Content-Security-Policy" content="
        default-src 'self';
        img-src 'self' data:;
        script-src 'self' 'unsafe-inline';
        style-src 'self' 'unsafe-inline';
        worker-src 'self';
        manifest-src 'self';
        connect-src 'none';
        object-src 'none';
        base-uri 'none';
        form-action 'none';
    ">
    
    <!-- PWA -->
    <link rel="manifest" href="./manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Notes">
    <link rel="apple-touch-icon" href="./assets/icon-192.png">
    
    <!-- Open Graph -->
    <meta property="og:title" content="📝 Minimalist Notes">
    <meta property="og:description" content="極簡暗黑筆記本 — 你的思緒值得一個安靜的角落">
    <meta property="og:type" content="website">
    <meta property="og:image" content="./assets/icon-512.png">
    
    <!-- Favicon -->
    <link rel="icon" href="./assets/favicon.svg" type="image/svg+xml">
    <link rel="icon" href="./assets/icon-192.png" sizes="192x192" type="image/png">
    <link rel="apple-touch-icon" href="./assets/icon-192.png">
    <link rel="shortcut icon" href="./assets/icon-192.png">
    
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #111;
            color: #f0f0f0;
        }
        
        #doc {
            display: block;
            width: 100%;
            height: 100dvh;
            border: none;
            padding: 1.5rem;
            padding-bottom: 3rem;
            font-size: 1.125rem;
            line-height: 1.7;
            background-color: #111;
            color: #f0f0f0;
            word-wrap: break-word;
            overflow-wrap: break-word;
            tab-size: 2;
            resize: none;
            font-family: 'SF Mono', Menlo, Consolas, Monaco, 'Liberation Mono', 
                         'Lucida Console', 'Courier New', monospace;
            caret-color: #6cf;
            -webkit-font-smoothing: antialiased;
        }
        
        @supports not (height: 100dvh) {
            #doc { height: 100%; }
        }
        
        #doc:focus { outline: none; }
        #doc::placeholder { color: #555; font-style: italic; }
        #doc::selection { background-color: #346; color: #fff; }
        
        /* Scrollbar */
        #doc::-webkit-scrollbar { width: 10px; }
        #doc::-webkit-scrollbar-track { background: #1a1a1a; }
        #doc::-webkit-scrollbar-thumb { 
            background: #333; 
            border-radius: 5px; 
            border: 2px solid #1a1a1a; 
        }
        #doc::-webkit-scrollbar-thumb:hover { background: #444; }
        #doc { scrollbar-width: thin; scrollbar-color: #333 #1a1a1a; }
        
        /* Status */
        #status {
            position: fixed;
            bottom: 1rem;
            right: 1rem;
            padding: 0.4rem 0.8rem;
            background: rgba(30, 30, 30, 0.9);
            -webkit-backdrop-filter: blur(10px);
            backdrop-filter: blur(10px);
            border: 1px solid #333;
            border-radius: 2rem;
            font-size: 0.75rem;
            font-family: system-ui, -apple-system, sans-serif;
            color: #888;
            opacity: 0;
            transform: translateY(10px);
            transition:
                opacity 0.3s ease,
                transform 0.3s ease;
            pointer-events: none;
            z-index: 1000;
        }
        
        #status.show {
            opacity: 1;
            transform: translateY(0);
        }
        
        @supports (padding: env(safe-area-inset-bottom)) {
            #doc {
                padding-bottom: calc(3rem + env(safe-area-inset-bottom));
            }
            #status {
                bottom: calc(1rem + env(safe-area-inset-bottom));
            }
        }
    </style>
</head>
<body>
    <textarea 
        id="doc"
        aria-label="筆記內容"
        autofocus
        spellcheck="false"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="off"
        placeholder="開始書寫...
───────────────────────────
  ✨  自動保存至瀏覽器
  🔄  即時跨分頁同步
  📴  支援離線使用
  ⌨️  Ctrl+S 手動保存
  ⬇️  Ctrl+Shift+S 匯出備份
───────────────────────────"
    ></textarea>
    
    <div id="status" role="status" aria-live="polite" aria-atomic="true"></div>
    
    <script>
    (() => {
        'use strict';
        
        const CONFIG = Object.freeze({
            STORAGE_KEY_DOC: 'notes-content-v2',
            STORAGE_KEY_TIME: 'notes-timestamp-v2',
            DEBOUNCE_DELAY: 300,
            STATUS_DISPLAY_TIME: 2000,
            SYNC_INTERVAL: 2000
        });
        
        const doc = document.getElementById('doc');
        const status = document.getElementById('status');
        
        let lastSaveTime = 0;
        let statusTimeoutId = null;
        let dirty = false;
        
        // Storage
        const storage = {
            isAvailable: (() => {
                try {
                    const test = '__test__';
                    localStorage.setItem(test, test);
                    localStorage.removeItem(test);
                    return true;
                } catch { return false; }
            })(),
            
            get(key) {
                try { return localStorage.getItem(key); } 
                catch { return null; }
            },
            
            set(key, value) {
                try { 
                    localStorage.setItem(key, value); 
                    return true; 
                } catch (e) {
                    if (e.name === 'QuotaExceededError') {
                        showStatus('⚠️ 儲存空間已滿', 3000);
                    }
                    return false;
                }
            }
        };
        
        // UI
        function showStatus(message, duration = CONFIG.STATUS_DISPLAY_TIME) {
            status.textContent = message;
            status.classList.add('show');
            clearTimeout(statusTimeoutId);
            statusTimeoutId = setTimeout(() => status.classList.remove('show'), duration);
        }
        
        function debounce(fn, delay) {
            let id;
            return (...args) => { clearTimeout(id); id = setTimeout(() => fn(...args), delay); };
        }
        
        // Core
        function loadContent() {
            const content = storage.get(CONFIG.STORAGE_KEY_DOC);
            const time = storage.get(CONFIG.STORAGE_KEY_TIME);
            lastSaveTime = time ? Number(time) : 0;
            if (content !== null) doc.value = content;
        }
        
        function saveContent(notify = true) {
            const now = Date.now();
            if (
                storage.set(CONFIG.STORAGE_KEY_DOC, doc.value) &&
                storage.set(CONFIG.STORAGE_KEY_TIME, now.toString())
            ) {
                lastSaveTime = now;
                dirty = false;
                if (notify) showStatus('✓ 已保存');
                return true;
            }
            return false;
        }
        
        const debouncedSave = debounce(() => saveContent(true), CONFIG.DEBOUNCE_DELAY);
        
        function syncFromStorage(force = false) {
            const storedTime = Number(storage.get(CONFIG.STORAGE_KEY_TIME)) || 0;
            if (storedTime <= lastSaveTime) return;
            
            if (!force && dirty && document.activeElement === doc) {
                showStatus('⚠️ 另一分頁有新內容，暫未覆蓋目前輸入', 3000);
                return;
            }
            
            const content = storage.get(CONFIG.STORAGE_KEY_DOC);
            if (content !== null && content !== doc.value) {
                const start = doc.selectionStart;
                const end = doc.selectionEnd;
                doc.value = content;
                lastSaveTime = storedTime;
                dirty = false;
                const len = content.length;
                doc.setSelectionRange(
                    Math.min(start, len),
                    Math.min(end, len)
                );
                showStatus('🔄 已同步');
            }
        }
        
        // Export backup as .txt
        function exportBackup() {
            const blob = new Blob([doc.value], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `notes-${new Date().toISOString().slice(0, 10)}.txt`;
            a.click();
            URL.revokeObjectURL(url);
            showStatus('⬇️ 已匯出');
        }
        
        // Events
        function setupEvents() {
            doc.addEventListener('input', () => {
                dirty = true;
                debouncedSave();
            });
            
            // Only listen to timestamp key — let syncFromStorage decide
            window.addEventListener('storage', (e) => {
                if (e.key === CONFIG.STORAGE_KEY_TIME) {
                    syncFromStorage();
                }
            });
            
            document.addEventListener('visibilitychange', () => {
                if (document.visibilityState === 'hidden') {
                    saveContent(false);
                } else {
                    syncFromStorage();
                }
            });
            
            window.addEventListener('pagehide', () => saveContent(false));
            window.addEventListener('beforeunload', () => saveContent(false));
            
            doc.addEventListener('keydown', (e) => {
                // Ctrl+Shift+S → 匯出備份
                if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key.toLowerCase() === 's') {
                    e.preventDefault();
                    exportBackup();
                    return;
                }
                // Ctrl+S → 手動保存
                if ((e.ctrlKey || e.metaKey) && !e.shiftKey && e.key.toLowerCase() === 's') {
                    e.preventDefault();
                    saveContent(true);
                    showStatus('💾 已保存');
                }
            });
        }
        
        // Service Worker
        function registerSW() {
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('./sw.js')
                    .then(() => console.log('✅ SW registered'))
                    .catch(() => console.log('ℹ️ SW not available'));
            }
        }
        
        // Init
        function init() {
            if (!storage.isAvailable) {
                alert('⚠️ 瀏覽器不支援本地儲存，筆記將無法保存。');
                return;
            }
            loadContent();
            setupEvents();
            registerSW();
            setInterval(syncFromStorage, CONFIG.SYNC_INTERVAL);
        }
        
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    })();
    </script>
</body>
</html>
