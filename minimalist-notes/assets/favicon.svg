<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="title">
  <title>Minimalist Notes</title>
  <style>
    .bg { fill: #111111; }
    .fg { stroke: #f0f0f0; }
    /* 自動適配淺色模式的瀏覽器 UI */
    @media (prefers-color-scheme: light) {
      .bg { fill: #f5f5f0; }
      .fg { stroke: #1a1a1a; }
    }
  </style>
  <!-- 背景圓角方塊 -->
  <rect class="bg" width="64" height="64" rx="14"/>
  <!-- 筆記橫線 - 極簡三線 -->
  <g class="fg" fill="none" stroke-width="3.5" stroke-linecap="round">
    <line x1="18" y1="24" x2="46" y2="24"/>
    <line x1="18" y1="34" x2="46" y2="34"/>
    <line x1="18" y1="44" x2="36" y2="44"/>
  </g>
</svg>