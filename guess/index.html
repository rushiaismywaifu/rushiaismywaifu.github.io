<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>極限終極密碼 🎲 Number Guess</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 慶祝特效 Canvas -->
    <canvas id="confetti"></canvas>

    <main class="game-container" id="gameContainer">
        <!-- 頂部標題 -->
        <header class="header">
            <div class="title-area">
                <span class="title-icon">🎲</span>
                <h1>終極密碼</h1>
            </div>
            <a href="../index.html" class="back-link">🏠 返回首頁</a>
        </header>

        <!-- 難度選擇 -->
        <div class="difficulty-selector">
            <button class="diff-btn active" data-mode="easy">🟢 輕鬆 (1~100)</button>
            <button class="diff-btn" data-mode="normal">🟡 挑戰 (7次必勝)</button>
            <button class="diff-btn" data-mode="hard">🔴 地獄 (1~1000)</button>
        </div>

        <!-- 範圍大卡片 -->
        <section class="range-card">
            <div class="range-label">當前密碼範圍</div>
            <div class="range-numbers">
                <span id="minVal">1</span>
                <span class="range-separator">~</span>
                <span id="maxVal">100</span>
            </div>
            <!-- 統計資訊 -->
            <div class="stats-bar">
                <span>猜測次數：<strong class="stat-value" id="attemptCount">0</strong></span>
                <span>剩餘機會：<strong class="stat-value" id="remainsCount">無限</strong></span>
            </div>
        </section>

        <!-- 提示反饋框 -->
        <div class="message-box" id="messageBox">
            💡 請輸入數字開始挑戰終極密碼！
        </div>

        <!-- 輸入與按鈕區 -->
        <section class="input-section">
            <div class="input-row">
                <input type="number" id="guessInput" placeholder="輸入數字" autocomplete="off" autofocus />
                <button class="btn-guess" id="btnGuess">猜！</button>
            </div>
            <!-- 智能取中點小工具 -->
            <div class="quick-helpers">
                <button class="btn-helper" id="btnMid">🎯 推薦二分法中點：50</button>
            </div>
        </section>

        <!-- 猜測歷史紀錄 -->
        <section class="history-section">
            <div class="history-title">
                <span>📜 猜測紀錄</span>
                <span id="historyCount">0 筆</span>
            </div>
            <div class="history-list" id="historyList">
                <!-- 動態載入猜測歷史 -->
            </div>
        </section>

        <!-- 重新開始 / 操作 -->
        <div class="action-buttons">
            <button class="btn-restart" id="btnRestart">🔄 再來一局</button>
        </div>

        <!-- God Mode 彩蛋面板 -->
        <div class="god-mode-panel" id="godModePanel">
            <div class="god-mode-title">
                <span>⚡ GOD MODE 上帝控制台</span>
                <span style="font-size: 0.75rem; color: #fff;">(彩蛋 5487 已解鎖)</span>
            </div>
            <div class="god-mode-controls">
                <input type="number" id="godInput" placeholder="強制設定目標數字" style="padding: 8px; font-size: 0.9rem;" />
                <button class="btn-god" id="btnSetGod">設定</button>
                <button class="btn-god" id="btnShowGod" style="background: #333;">👀 偷看答案</button>
                <button class="btn-god" id="btnExitGod" style="background: #444;">關閉</button>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
