    <style>
      /* 全域設定 */
      body {
        font-family: Arial, "Microsoft JhengHei", sans-serif;
        background-color: #f4f7f6;
        color: #333;
        margin: 0;
        padding: 20px;
        line-height: 1.6;
      }
      
      .container {
        max-width: 800px;
        margin: 0 auto;
        background: #ffffff;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.05);
      }

      h2 {
        color: #fb7299; /* 採用 B站/粉色系 */
        border-bottom: 2px solid #eee;
        padding-bottom: 10px;
        margin-top: 30px;
      }

      /* === 導��按鈕網格設計 === */
      .nav-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
        gap: 15px;
        margin: 20px 0;
      }
      .nav-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 12px;
        background: #fff;
        color: #fb7299;
        text-decoration: none;
        border: 2px solid #fb7299;
        border-radius: 8px;
        font-weight: bold;
        font-size: 15px;
        transition: all 0.3s ease;
        text-align: center;
      }
      .nav-btn:hover {
        background: #fb7299;
        color: #fff;
        transform: translateY(-2px);
        box-shadow: 0 4px 10px rgba(251, 114, 153, 0.3);
      }

      /* === 測試區塊設定 === */
      .test-area {
        background: #fdfdfd;
        border: 1px dashed #ccc;
        padding: 15px;
        border-radius: 8px;
      }
      .test-area audio {
        width: 100%;
        margin-bottom: 15px;
      }

      /* === 響應式圖片 === */
      .responsive-img {
        max-width: 100%;
        height: auto;
        border-radius: 8px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        display: block;
        margin: 20px auto;
      }

      /* === 原有短網址產生器 CSS 調整 === */
      .bili-short-url-box {
        margin: 20px 0;
        padding: 20px;
        border: 2px solid #00a1d6;
        border-radius: 10px;
        background: linear-gradient(135deg, #f0f8ff, #e8f4fd);
        max-width: 100%;
      }
      .bili-short-url-box h3 {
        margin: 0 0 6px 0;
        color: #00a1d6;
      }
      .bili-short-url-box .desc {
        margin: 0 0 12px 0;
        color: #555;
        font-size: 14px;
      }
      .bili-short-url-box .input-row {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }
      .bili-short-url-box input[type="text"] {
        flex: 1;
        min-width: 200px;
        padding: 10px 12px;
        border: 1px solid #ccc;
        border-radius: 6px;
        font-size: 14px;
        outline: none;
        transition: border-color .3s;
      }
      .bili-short-url-box input[type="text"]:focus {
        border-color: #00a1d6;
      }
      .gen-btn {
        padding: 10px 20px;
        background: #00a1d6;
        color: #fff;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 14px;
        font-weight: bold;
        transition: background .3s;
        white-space: nowrap;
      }
      .gen-btn:hover { background: #0087b3; }
      .gen-btn:disabled { background: #aaa; cursor: not-allowed; }
      #shortUrlResult {
        display: none;
        margin-top: 12px;
        padding: 12px;
        background: #fff;
        border-radius: 6px;
        border: 1px solid #ddd;
        word-break: break-all;
        line-height: 1.7;
        font-size: 14px;
      }
      #shortUrlResult a {
        color: #00a1d6;
        font-weight: bold;
        text-decoration: none;
      }
      #shortUrlResult a:hover { text-decoration: underline; }
      .copy-btn {
        padding: 4px 12px;
        background: #fb7299;
        color: #fff;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 13px;
        margin-left: 8px;
        transition: background .3s;
      }
      .copy-btn:hover { background: #e0527a; }
    </style>
  </head>
  <body>

    <div class="container">

      <!-- ===== 1. 導航區域 ===== -->

      <!-- ===== 2. 工具區域 ===== -->
      <h2>🛠️ 實用工具</h2>
      <div class="bili-short-url-box">
        <h3>🔗 Bilibili 短網址產生器</h3>
        <p class="desc">輸入任意 Bilibili 站內網址，產生 b23.tv 短網址</p>
        <div class="input-row">
          <input type="text" id="biliUrlInput"
                 placeholder="例：https://www.bilibili.com/video/BV1GJ411x7h7"
                 onkeydown="if(event.key==='Enter')generateShortUrl();" />
          <button class="gen-btn" id="genBtn" onclick="generateShortUrl()">產生短網址</button>

      <!-- ===== 3. 測試與實驗區域 ===== -->

        <p>&nbsp;嗨， <u><em><strong>test</strong></em></u>&nbsp; <s>Hello world!</s></p>
        <p style="text-align:center">x <sup>2</sup>+2x+1=0 </p>
        
        <div style="display: flex; justify-content: space-between;">
          <p>左邊</p>
          <p>右邊</p>
        </div>
        <hr />
        
        <!-- 音檔測試 -->

        <p>
          <select multiple="true" name="欄位" style="padding: 5px;">

    <!-- ===== JS 腳本維持原樣 ===== -->
    <script>
    var WORKER_URL = 'https://soft-boat-f648.csgtung88.workers.dev';

    async function generateShortUrl() {
      var input  = document.getElementById('biliUrlInput');
      var result = document.getElementById('shortUrlResult');
      var btn    = document.getElementById('genBtn');
      var url    = input.value.trim();

      result.style.display = 'block';

      if (!url) {
        result.innerHTML = '<span style="color:#e74c3c">⚠️ 請輸入 Bilibili 網址</span>';
        return;
      }
      if (!/^https?:\/\//i.test(url)) url = 'https://' + url;
      if (!/bilibili\.com/i.test(url)) {
        result.innerHTML = '<span style="color:#e74c3c">⚠️ 網址域名必須為 *.bilibili.com</span>';
        return;
      }

      btn.disabled = true;
      btn.textContent = '處理中…';
      result.innerHTML = '<span style="color:#666">⏳ 產生中，請稍候…</span>';

      var params = new URLSearchParams({
        platform:      'unix',
        share_channel: 'COPY',
        share_id:      'public.webview.0.0.pv',
        share_mode:    '4',
        oid:           url,
        buvid:         'qwq',
        build:         '6114514'
      });

      try {
        var resp = await fetch(WORKER_URL, {
          method:  'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body:    params.toString()
        });

        var data = await resp.json();

        btn.disabled = false;
        btn.textContent = '產生短網址';

        if (data.code === 0 && data.data && data.data.content) {
          var content = data.data.content;
          var match   = content.match(/(https?:\/\/b23\.tv\/\S+)/);

          if (match) {
            var short = match[1];
            result.innerHTML =
              '✅ 短網址：<a href="' + short + '" target="_blank">' + short + '</a>' +
              ' <button class="copy-btn" onclick="copyText(\'' + short + '\',this)">📋 複製</button>' +
              '<br><small style="color:#888">📝 ' + escapeHtml(content) + '</small>';
          } else {
            result.innerHTML = '✅ 回傳內容：' + escapeHtml(content);
          }
        } else {
          result.innerHTML =
            '<span style="color:#e74c3c">❌ 產生失敗：' +
            escapeHtml(data.message || JSON.stringify(data)) + '</span>';
        }

      } catch (e) {
        btn.disabled = false;
        btn.textContent = '產生短網址';
        result.innerHTML =
          '<span style="color:#e74c3c">❌ 網路錯誤：' + escapeHtml(e.message) +
          '<br>請確認 Worker 網址是否正確</span>';
      }
    }

    function copyText(text, btnEl) {
      navigator.clipboard.writeText(text).then(function () {
        btnEl.textContent = '✅ 已複製';
        setTimeout(function () { btnEl.textContent = '📋 複製'; }, 2000);
      }).catch(function () {
        var ta = document.createElement('textarea');
        ta.value = text;
        ta.style.position = 'fixed';
        ta.style.left = '-9999px';
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        btnEl.textContent = '✅ 已複製';
        setTimeout(function () { btnEl.textContent = '📋 複製'; }, 2000);
      });
    }

    function escapeHtml(str) {
      var d = document.createElement('div');
      d.appendChild(document.createTextNode(str));
      return d.innerHTML;
    }
    </script>
