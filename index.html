  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: Arial, "Microsoft JhengHei", sans-serif;
      margin: 0;
      padding: 20px;
      background: #fafafa;
      color: #333;
      line-height: 1.5;
    }

    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      clip-path: inset(50%);
      white-space: nowrap;
      border: 0;
    }

    /* ===== 共用卡片 ===== */
    .card {
      max-width: 700px;
      margin: 20px 0;
      padding: 24px;
      border-width: 2px;
      border-style: solid;
      border-radius: 14px;
    }

    .card h3 {
      margin: 0 0 6px 0;
      font-size: 20px;
    }

    .card-desc {
      margin: 0 0 14px 0;
      color: #666;
      font-size: 14px;
    }

    .card--pink {
      border-color: #fb7299;
      background: linear-gradient(135deg, #fff5f8, #fff0f5);
      box-shadow: 0 4px 16px rgba(251, 114, 153, .12);
    }

    .card--pink h3 {
      color: #fb7299;
    }

    .card--blue {
      border-color: #00a1d6;
      background: linear-gradient(135deg, #f0f8ff, #e8f4fd);
      box-shadow: 0 4px 16px rgba(0, 161, 214, .1);
    }

    .card--blue h3 {
      color: #00a1d6;
    }

    /* ===== 導航區塊 ===== */
    .nav-section .card-desc {
      margin-bottom: 16px;
      color: #888;
      font-size: 13px;
    }

    .nav-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 10px;
    }

    .nav-grid a {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 14px;
      background: #fff;
      border: 1px solid #f0d0da;
      border-radius: 10px;
      color: #333;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      position: relative;
      overflow: hidden;
      transition:
        border-color .25s ease,
        background-color .25s ease,
        transform .25s ease,
        box-shadow .25s ease;
    }

    .nav-grid a::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 4px;
      height: 100%;
      background: #fb7299;
      transform: scaleY(0);
      transition: transform .25s ease;
      border-radius: 0 4px 4px 0;
    }

    .nav-grid a:hover,
    .nav-grid a:focus-visible {
      border-color: #fb7299;
      background: #fff5f8;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(251, 114, 153, .15);
      outline: none;
    }

    .nav-grid a:hover::before,
    .nav-grid a:focus-visible::before {
      transform: scaleY(1);
    }

    .nav-grid a .nav-icon {
      font-size: 18px;
      flex-shrink: 0;
      width: 24px;
      text-align: center;
    }

    /* ===== Bilibili 短網址 ===== */
    .bili-short-url-box .input-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .bili-short-url-box input[type="text"] {
      flex: 1;
      min-width: 200px;
      padding: 10px 14px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      transition: border-color .3s, box-shadow .3s;
    }

    .bili-short-url-box input[type="text"]:focus {
      border-color: #00a1d6;
      box-shadow: 0 0 0 3px rgba(0, 161, 214, .15);
    }

    .gen-btn {
      padding: 10px 22px;
      background-color: #00a1d6;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: bold;
      transition: background-color .3s, transform .15s;
      white-space: nowrap;
    }

    .gen-btn:hover:not(:disabled) {
      background-color: #0087b3;
      transform: translateY(-1px);
    }

    .gen-btn:active:not(:disabled) {
      transform: translateY(0);
    }

    .gen-btn:disabled {
      background-color: #aaa;
      cursor: not-allowed;
      transform: none;
    }

    #shortUrlResult {
      display: none;
      margin-top: 12px;
      padding: 14px;
      background: #fff;
      border-radius: 8px;
      border: 1px solid #ddd;
      word-break: break-all;
      line-height: 1.8;
      font-size: 14px;

    #shortUrlResult a {
      color: #00a1d6;
      font-weight: bold;
      text-decoration: none;
    }

    #shortUrlResult a:hover {

    .message-error {
      color: #e74c3c;
    }

    .message-muted {

    }

    .result-small {

    }

    .copy-btn {
      padding: 4px 12px;
      background-color: #fb7299;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      margin-left: 8px;
      transition: background-color .3s;
    }

    .copy-btn:hover {
      background-color: #e0527a;
    }

    /* ===== 其他區塊 ===== */
    .content-section {

    .form-field .inline-label {

    @media (max-width: 480px) {

      }
    }

  <section class="card card--blue bili-short-url-box" aria-labelledby="bili-short-url-title">
    <h3 id="bili-short-url-title">🔗 Bilibili 短網址產生器</h3>
    <p class="card-desc">輸入任意 Bilibili 站內網址，產生 b23.tv 短網址</p>

    <div class="input-row">
      <label class="visually-hidden" for="biliUrlInput">Bilibili 網址</label>
      <input
        type="text"
        id="biliUrlInput"
        placeholder="例：https://www.bilibili.com/video/BV1GJ411x7h7"
        autocomplete="url">

      <button class="gen-btn" id="genBtn" type="button">產生短網址</button>

  <figure class="bottom-figure">

      alt="底部圖片"
      class="bottom-img"

      decoding="async"
      src="https://raw.githubusercontent.com/rushiaismywaifu/rushiaismywaifu.github.io/main/d.png">
  </figure>

  <script>
    "use strict";

    /*
     * 注意：
     * 前端程式碼無法真正隱藏 Worker URL。
     * 若有流量或安全性考量，請在 Worker 端加入 rate limiting / Referer 檢查。
     */
    const WORKER_URL = "https://soft-boat-f648.csgtung88.workers.dev";

    document.addEventListener("DOMContentLoaded", () => {
      const input = document.getElementById("biliUrlInput");
      const btn = document.getElementById("genBtn");

      btn.addEventListener("click", generateShortUrl);

      input.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          event.preventDefault();
          generateShortUrl();
        }
      });
    });

    async function generateShortUrl() {
      const input = document.getElementById("biliUrlInput");
      const btn = document.getElementById("genBtn");

      if (btn.disabled) return;

      const rawUrl = input.value.trim();

      if (!rawUrl) {
        showMessage("⚠️ 請輸入 Bilibili 網址", "error");
        return;
      }

      let normalizedUrl;

      try {
        normalizedUrl = normalizeBilibiliUrl(rawUrl);
      } catch (error) {
        showMessage(`⚠️ ${error.message}`, "error");
        return;
      }

      btn.disabled = true;
      btn.textContent = "處理中…";
      showMessage("⏳ 產生中，請稍候…", "muted");

      const params = new URLSearchParams({
        platform: "unix",
        share_channel: "COPY",
        share_id: "public.webview.0.0.pv",
        share_mode: "4",
        oid: normalizedUrl,
        buvid: "qwq",
        build: "6114514"
      });

      try {
        const resp = await fetch(WORKER_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/x-www-form-urlencoded;charset=UTF-8"
          },
          body: params.toString()
        });

        if (!resp.ok) {
          throw new Error(`HTTP ${resp.status}`);
        }

        const data = await resp.json();

        if (data.code === 0 && data.data && typeof data.data.content !== "undefined") {
          const content = String(data.data.content);
          const shortUrl = extractB23Url(content);

          if (shortUrl) {
            renderShortUrl(shortUrl, content);
          } else {
            renderReturnedContent(content);
          }
        } else {
          const message = data && data.message
            ? String(data.message)
            : JSON.stringify(data);

          showMessage(`❌ 產生失敗：${message || "未知錯誤"}`, "error");
        }
      } catch (error) {
        showMessage(
          `❌ 請求失敗：${error.message}\n請確認 Worker 網址是否正確或稍後再試`,
          "error"
        );
      } finally {
        btn.disabled = false;
        btn.textContent = "產生短網址";
      }
    }

    function normalizeBilibiliUrl(rawUrl) {
      let url = rawUrl.trim();

      const hasScheme = /^[a-zA-Z][a-zA-Z\d+\-.]*:\/\//.test(url);

      if (!hasScheme) {
        url = `https://${url}`;
      }

      const parsedUrl = new URL(url);

      if (parsedUrl.protocol !== "http:" && parsedUrl.protocol !== "https:") {
        throw new Error("網址協定必須為 http 或 https");
      }

      const hostname = parsedUrl.hostname.toLowerCase();
      const isBilibiliDomain =
        hostname === "bilibili.com" || hostname.endsWith(".bilibili.com");

      if (!isBilibiliDomain) {
        throw new Error("網址域名必須為 bilibili.com 或 *.bilibili.com");
      }

      return parsedUrl.href;
    }

    function extractB23Url(content) {
      const match = String(content).match(/https?:\/\/b23\.tv\/[^\s"'<>]+/i);

      if (!match) {
        return "";
      }

      try {
        const parsedUrl = new URL(match[0]);

        if (parsedUrl.hostname.toLowerCase() !== "b23.tv") {
          return "";
        }

        if (parsedUrl.protocol !== "http:" && parsedUrl.protocol !== "https:") {
          return "";
        }

        return parsedUrl.href;
      } catch {
        return "";
      }
    }

    function getResultElement() {
      return document.getElementById("shortUrlResult");
    }

    function showMessage(message, type = "muted") {
      const result = getResultElement();
      result.style.display = "block";
      result.textContent = "";

      const span = document.createElement("span");
      span.className = type === "error" ? "message-error" : "message-muted";

      appendTextWithBreaks(span, message);
      result.appendChild(span);
    }

    function appendTextWithBreaks(parent, text) {
      const lines = String(text).split("\n");

      lines.forEach((line, index) => {
        if (index > 0) {
          parent.appendChild(document.createElement("br"));
        }

        parent.appendChild(document.createTextNode(line));
      });
    }

    function renderShortUrl(shortUrl, content) {
      const result = getResultElement();
      result.style.display = "block";
      result.textContent = "";

      const link = document.createElement("a");
      link.href = shortUrl;
      link.target = "_blank";
      link.rel = "noopener noreferrer";
      link.textContent = shortUrl;

      const copyBtn = document.createElement("button");
      copyBtn.type = "button";
      copyBtn.className = "copy-btn";
      copyBtn.textContent = "📋 複製";
      copyBtn.addEventListener("click", () => {
        copyText(shortUrl, copyBtn);
      });

      const small = document.createElement("small");
      small.className = "result-small";
      small.textContent = `📝 ${content}`;

      result.appendChild(document.createTextNode("✅ 短網址："));
      result.appendChild(link);
      result.appendChild(document.createTextNode(" "));
      result.appendChild(copyBtn);
      result.appendChild(document.createElement("br"));
      result.appendChild(small);
    }

    function renderReturnedContent(content) {
      const result = getResultElement();
      result.style.display = "block";
      result.textContent = "";
      result.appendChild(document.createTextNode(`✅ 回傳內容：${content}`));
    }

    async function copyText(text, btnEl) {
      const defaultText = "📋 複製";

      try {
        if (navigator.clipboard && window.isSecureContext) {
          await navigator.clipboard.writeText(text);
        } else {
          fallbackCopyText(text);
        }

        btnEl.textContent = "✅ 已複製";
      } catch {
        btnEl.textContent = "❌ 複製失敗";
      } finally {
        window.setTimeout(() => {
          btnEl.textContent = defaultText;
        }, 2000);
      }
    }

    function fallbackCopyText(text) {
      const textarea = document.createElement("textarea");

      textarea.value = text;
      textarea.setAttribute("readonly", "");
      textarea.style.position = "fixed";
      textarea.style.left = "-9999px";
      textarea.style.top = "0";

      document.body.appendChild(textarea);
      textarea.focus();
      textarea.select();

      try {
        // execCommand("copy") 已 deprecated，僅作為舊瀏覽器 fallback。
        const successful = document.execCommand("copy");

        if (!successful) {
          throw new Error("Fallback copy failed");
        }
      } finally {
        document.body.removeChild(textarea);
      }
    }
  </script>
