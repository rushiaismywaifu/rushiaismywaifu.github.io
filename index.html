      * { box-sizing: border-box; }
      body {
        font-family: Arial, "Microsoft JhengHei", sans-serif;
        margin: 0;
        padding: 20px;
        background: #fafafa;

      /* ===== 導航區塊 ===== */
      .nav-section {
        max-width: 700px;
        margin: 20px 0;
        padding: 24px;
        border: 2px solid #fb7299;
        border-radius: 14px;
        background: linear-gradient(135deg, #fff5f8, #fff0f5);
        box-shadow: 0 4px 16px rgba(251,114,153,.12);
      }
      .nav-section h3 {
        margin: 0 0 6px 0;
        color: #fb7299;
        font-size: 20px;
      }
      .nav-section .nav-desc {
        margin: 0 0 16px 0;
        color: #888;
        font-size: 13px;
      }
      .nav-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
        gap: 10px;
      }
      .nav-grid a {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 12px 14px;
        background: #fff;
        border: 1px solid #f0d0da;
        border-radius: 10px;
        color: #333;
        text-decoration: none;
        font-size: 14px;
        font-weight: 500;
        transition: all .25s ease;
        position: relative;
        overflow: hidden;
      }
      .nav-grid a::before {
        content: '';
        position: absolute;
        top: 0; left: 0;
        width: 4px; height: 100%;
        background: #fb7299;
        transform: scaleY(0);
        transition: transform .25s ease;
        border-radius: 0 4px 4px 0;
      }
      .nav-grid a:hover {
        border-color: #fb7299;
        background: #fff5f8;
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(251,114,153,.15);
      }
      .nav-grid a:hover::before {
        transform: scaleY(1);
      }
      .nav-grid a .nav-icon {
        font-size: 18px;
        flex-shrink: 0;
        width: 24px;
        text-align: center;
      }

      /* ===== Bilibili 短網址 ===== */
      .bili-short-url-box {
        margin: 20px 0;
        padding: 24px;
        border: 2px solid #00a1d6;
        border-radius: 14px;
        background: linear-gradient(135deg, #f0f8ff, #e8f4fd);
        max-width: 700px;
        box-shadow: 0 4px 16px rgba(0,161,214,.1);
      }
      .bili-short-url-box h3 {
        margin: 0 0 6px 0;
        color: #00a1d6;
        font-size: 20px;
      }
      .bili-short-url-box .desc {
        margin: 0 0 14px 0;
        color: #666;
        font-size: 14px;
      }
      .bili-short-url-box .input-row {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }
      .bili-short-url-box input[type="text"] {
        flex: 1;
        min-width: 200px;
        padding: 10px 14px;
        border: 1px solid #ccc;
        border-radius: 8px;
        font-size: 14px;
        outline: none;
        transition: border-color .3s, box-shadow .3s;
      }
      .bili-short-url-box input[type="text"]:focus {
        border-color: #00a1d6;
        box-shadow: 0 0 0 3px rgba(0,161,214,.15);
      }
      .gen-btn {
        padding: 10px 22px;
        background: #00a1d6;
        color: #fff;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 14px;
        font-weight: bold;
        transition: background .3s, transform .15s;
        white-space: nowrap;
      }
      .gen-btn:hover { background: #0087b3; transform: translateY(-1px); }
      .gen-btn:active { transform: translateY(0); }
      .gen-btn:disabled { background: #aaa; cursor: not-allowed; transform: none; }
      #shortUrlResult {
        display: none;
        margin-top: 12px;
        padding: 14px;
        background: #fff;
        border-radius: 8px;
        border: 1px solid #ddd;
        word-break: break-all;
        line-height: 1.8;
        font-size: 14px;
      }
      #shortUrlResult a {
        color: #00a1d6;
        font-weight: bold;
        text-decoration: none;
      }
      #shortUrlResult a:hover { text-decoration: underline; }
      .copy-btn {
        padding: 4px 12px;
        background: #fb7299;
        color: #fff;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 13px;
        margin-left: 8px;
        transition: background .3s;
      }
      .copy-btn:hover { background: #e0527a; }

      /* ===== 其他區塊 ===== */

        margin: 20px 0;
        padding: 24px;
        background: #fff;
        border: 1px solid #eee;
        border-radius: 14px;

    <!-- ===== Bilibili 短網址產生器 ===== -->
    <div class="bili-short-url-box">
      <h3>🔗 Bilibili 短網址產生器</h3>
      <p class="desc">輸入任意 Bilibili 站內網址，產生 b23.tv 短網址</p>
      <div class="input-row">
        <input type="text" id="biliUrlInput"
               placeholder="例：https://www.bilibili.com/video/BV1GJ411x7h7"
               onkeydown="if(event.key==='Enter')generateShortUrl();" />
        <button class="gen-btn" id="genBtn" onclick="generateShortUrl()">產生短網址</button>

    <script>
    var WORKER_URL = 'https://soft-boat-f648.csgtung88.workers.dev';

    async function generateShortUrl() {
      var input  = document.getElementById('biliUrlInput');
      var result = document.getElementById('shortUrlResult');
      var btn    = document.getElementById('genBtn');
      var url    = input.value.trim();

      result.style.display = 'block';

      if (!url) {
        result.innerHTML = '<span style="color:#e74c3c">⚠️ 請輸入 Bilibili 網址</span>';
        return;
      }
      if (!/^https?:\/\//i.test(url)) url = 'https://' + url;
      if (!/bilibili\.com/i.test(url)) {
        result.innerHTML = '<span style="color:#e74c3c">⚠️ 網址域名必須為 *.bilibili.com</span>';
        return;
      }

      btn.disabled = true;
      btn.textContent = '處理中…';
      result.innerHTML = '<span style="color:#666">⏳ 產生中，請稍候…</span>';

      var params = new URLSearchParams({
        platform:      'unix',
        share_channel: 'COPY',
        share_id:      'public.webview.0.0.pv',
        share_mode:    '4',
        oid:           url,
        buvid:         'qwq',
        build:         '6114514'
      });

      try {
        var resp = await fetch(WORKER_URL, {
          method:  'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body:    params.toString()
        });

        var data = await resp.json();
        btn.disabled = false;
        btn.textContent = '產生短網址';

        if (data.code === 0 && data.data && data.data.content) {
          var content = data.data.content;
          var match   = content.match(/(https?:\/\/b23\.tv\/\S+)/);

          if (match) {
            var short = match[1];
            result.innerHTML =
              '✅ 短網址：<a href="' + short + '" target="_blank">' + short + '</a>' +
              ' <button class="copy-btn" onclick="copyText(\'' + short + '\',this)">📋 複製</button>' +
              '<br><small style="color:#888">📝 ' + escapeHtml(content) + '</small>';
          } else {
            result.innerHTML = '✅ 回傳內容：' + escapeHtml(content);
          }
        } else {
          result.innerHTML =
            '<span style="color:#e74c3c">❌ 產生失敗：' +
            escapeHtml(data.message || JSON.stringify(data)) + '</span>';
        }
      } catch (e) {
        btn.disabled = false;
        btn.textContent = '產生短網址';
        result.innerHTML =
          '<span style="color:#e74c3c">❌ 網路錯誤：' + escapeHtml(e.message) +
          '<br>請確認 Worker 網址是否正確</span>';
      }
    }

    function copyText(text, btnEl) {
      navigator.clipboard.writeText(text).then(function () {
        btnEl.textContent = '✅ 已複製';
        setTimeout(function () { btnEl.textContent = '📋 複製'; }, 2000);
      }).catch(function () {
        var ta = document.createElement('textarea');
        ta.value = text;
        ta.style.position = 'fixed';
        ta.style.left = '-9999px';
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        btnEl.textContent = '✅ 已複製';
        setTimeout(function () { btnEl.textContent = '📋 複製'; }, 2000);
      });
    }

    function escapeHtml(str) {
      var d = document.createElement('div');
      d.appendChild(document.createTextNode(str));
      return d.innerHTML;
    }
    </script>
